<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes draw {
      from { stroke-dashoffset: var(--len); }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    @keyframes wave1 {
      0%, 100% { d: path("M0,310 Q100,300 200,310 Q300,320 400,310 Q500,300 600,310 Q700,320 800,310 L800,400 L0,400 Z"); }
      50% { d: path("M0,312 Q100,320 200,308 Q300,300 400,312 Q500,320 600,308 Q700,300 800,312 L800,400 L0,400 Z"); }
    }
    @keyframes wave2 {
      0%, 100% { d: path("M0,320 Q100,312 200,320 Q300,328 400,320 Q500,312 600,320 Q700,328 800,320 L800,400 L0,400 Z"); }
      50% { d: path("M0,322 Q100,328 200,318 Q300,312 400,322 Q500,328 600,318 Q700,312 800,322 L800,400 L0,400 Z"); }
    }
    @keyframes wave3 {
      0%, 100% { d: path("M0,335 Q100,328 200,335 Q300,342 400,335 Q500,328 600,335 Q700,342 800,335 L800,400 L0,400 Z"); }
      50% { d: path("M0,337 Q100,342 200,333 Q300,328 400,337 Q500,342 600,333 Q700,328 800,337 L800,400 L0,400 Z"); }
    }
    @keyframes sunPulse {
      0%, 100% { r: 28; }
      50% { r: 30; }
    }
    @keyframes rayRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes cloudDrift {
      0% { transform: translateX(0); }
      100% { transform: translateX(40px); }
    }


    /* Background */
    .sky { fill: #fdf6ec; }
    .ocean-base { fill: #e8eff5; }

    /* Line style */
    .line {
      fill: none;
      stroke: #2c3e50;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .line-thin {
      fill: none;
      stroke: #2c3e50;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .line-bold {
      fill: none;
      stroke: #2c3e50;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Sun drawing */
    .sun-circle {
      stroke: #d4a04a;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 190;
      stroke-dashoffset: 190;
      animation: draw 2s ease-out 0.5s forwards;
      --len: 190;
    }
    .sun-fill {
      fill: #fdf6ec;
      stroke: none;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }
    .sun-rays {
      transform-origin: 650px 80px;
      animation: rayRotate 30s linear infinite;
    }
    .sun-ray {
      stroke: #d4a04a;
      stroke-width: 1.5;
      fill: none;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }
    .sun-ray:nth-child(1) { animation-delay: 1.8s; }
    .sun-ray:nth-child(2) { animation-delay: 1.9s; }
    .sun-ray:nth-child(3) { animation-delay: 2.0s; }
    .sun-ray:nth-child(4) { animation-delay: 2.1s; }
    .sun-ray:nth-child(5) { animation-delay: 2.2s; }
    .sun-ray:nth-child(6) { animation-delay: 2.3s; }
    .sun-ray:nth-child(7) { animation-delay: 2.4s; }
    .sun-ray:nth-child(8) { animation-delay: 2.5s; }

    /* Horizon line */
    .horizon {
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: draw 2s ease-out 0.3s forwards;
      --len: 800;
      stroke: #b8c6d4;
      stroke-width: 1;
    }

    /* Waves */
    .wave-line-1 {
      fill: #e8eff5;
      stroke: #8fa8bd;
      stroke-width: 1.2;
      animation: wave1 4s ease-in-out infinite;
      opacity: 0;
      animation: wave1 4s ease-in-out infinite, fadeIn 1s ease 1s forwards;
    }
    .wave-line-2 {
      fill: #dce7f0;
      stroke: #8fa8bd;
      stroke-width: 1;
      animation: wave2 4.5s ease-in-out 0.5s infinite, fadeIn 1s ease 1.2s forwards;
      opacity: 0;
    }
    .wave-line-3 {
      fill: #d0dde8;
      stroke: #8fa8bd;
      stroke-width: 0.8;
      animation: wave3 5s ease-in-out 1s infinite, fadeIn 1s ease 1.4s forwards;
      opacity: 0;
    }

    /* Ship group - bobbing */
    .ship-group {
      animation: bob 4s ease-in-out infinite;
    }

    /* Ship hull */
    .hull {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: draw 1.5s ease-out 2s forwards;
      --len: 500;
    }
    .hull-detail {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 1s ease-out 2.5s forwards;
      --len: 200;
    }

    /* Mast */
    .mast {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 0.8s ease-out 3s forwards;
      --len: 200;
    }

    /* Sails */
    .sail-main {
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw 1.2s ease-out 3.5s forwards;
      --len: 400;
    }
    .sail-front {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 1s ease-out 3.8s forwards;
      --len: 300;
    }
    .sail-fill {
      fill: #fdf6ec;
      stroke: none;
      opacity: 0;
      animation: fadeIn 0.8s ease 4.2s forwards;
    }



    /* Crew */
    .crew-member {
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }
    .crew-member:nth-child(1) { animation-delay: 4.8s; }
    .crew-member:nth-child(2) { animation-delay: 5.0s; }
    .crew-member:nth-child(3) { animation-delay: 5.2s; }
    .crew-member:nth-child(4) { animation-delay: 5.4s; }

    /* Crew waving arms - staggered */
    @keyframes wave1Arm {
      0%, 15%, 100% { transform: rotate(0deg); }
      5%, 10% { transform: rotate(-45deg); }
      7% { transform: rotate(-35deg); }
    }
    @keyframes wave2Arm {
      0%, 30%, 100% { transform: rotate(0deg); }
      20%, 25% { transform: rotate(-50deg); }
      22% { transform: rotate(-40deg); }
    }
    @keyframes wave3Arm {
      0%, 50%, 100% { transform: rotate(0deg); }
      40%, 45% { transform: rotate(-45deg); }
      42% { transform: rotate(-35deg); }
    }
    @keyframes wave4Arm {
      0%, 70%, 100% { transform: rotate(0deg); }
      60%, 65% { transform: rotate(-50deg); }
      62% { transform: rotate(-40deg); }
    }
    .wave-arm-1 {
      transform-origin: 420px 280px;
      animation: wave1Arm 10s ease-in-out 6s infinite;
    }
    .wave-arm-2 {
      transform-origin: 340px 282px;
      animation: wave2Arm 10s ease-in-out 6s infinite;
    }
    .wave-arm-3 {
      transform-origin: 380px 283px;
      animation: wave3Arm 10s ease-in-out 6s infinite;
    }
    .wave-arm-4 {
      transform-origin: 310px 285px;
      animation: wave4Arm 10s ease-in-out 6s infinite;
    }

    /* Neural constellation */
    @keyframes nodePulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    @keyframes nodePulseL {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.85; }
    }
    @keyframes edgeDraw {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes edgePulse {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.3; }
    }
    .neural-node {
      fill: #00ff41;
      opacity: 0;
      animation: nodePulse 4s ease-in-out infinite, fadeIn 1.5s ease 5.8s forwards;
    }
    .neural-node-lg {
      fill: #00ff41;
      opacity: 0;
      animation: nodePulseL 5s ease-in-out infinite, fadeIn 1.5s ease 5.6s forwards;
    }
    .neural-edge {
      stroke: #00ff41;
      stroke-width: 0.5;
      fill: none;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      opacity: 0;
      animation: edgeDraw 2s ease-out 6s forwards, edgePulse 5s ease-in-out 8s infinite;
    }
    .neural-node:nth-child(1) { animation-delay: 5.6s, 5.6s; }
    .neural-node:nth-child(2) { animation-delay: 5.8s, 5.8s; }
    .neural-node:nth-child(3) { animation-delay: 6.0s, 6.0s; }
    .neural-node:nth-child(4) { animation-delay: 6.2s, 6.2s; }
    .neural-node:nth-child(5) { animation-delay: 6.4s, 6.4s; }
    .neural-node:nth-child(6) { animation-delay: 6.6s, 6.6s; }
    .neural-node:nth-child(7) { animation-delay: 6.8s, 6.8s; }
    .neural-node:nth-child(8) { animation-delay: 7.0s, 7.0s; }
    .neural-edge:nth-child(1) { animation-delay: 6.2s, 8.2s; }
    .neural-edge:nth-child(2) { animation-delay: 6.4s, 8.4s; }
    .neural-edge:nth-child(3) { animation-delay: 6.6s, 8.6s; }
    .neural-edge:nth-child(4) { animation-delay: 6.8s, 8.8s; }
    .neural-edge:nth-child(5) { animation-delay: 7.0s, 9.0s; }
    .neural-edge:nth-child(6) { animation-delay: 7.2s, 9.2s; }
    .neural-edge:nth-child(7) { animation-delay: 7.4s, 9.4s; }
    .neural-edge:nth-child(8) { animation-delay: 7.6s, 9.6s; }
    .neural-edge:nth-child(9) { animation-delay: 7.8s, 9.8s; }
    .neural-edge:nth-child(10) { animation-delay: 8.0s, 10.0s; }
    .neural-edge:nth-child(11) { animation-delay: 8.2s, 10.2s; }


    /* Clouds */
    .cloud {
      opacity: 0;
      animation: fadeIn 1s ease forwards, cloudDrift 15s ease-in-out infinite alternate;
    }
    .cloud-1 { animation-delay: 1s; }
    .cloud-2 { animation-delay: 1.3s; }

    /* Sparkle on water */
    @keyframes sparkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.6; }
    }
    .sparkle {
      fill: #d4a04a;
      opacity: 0;
      animation: sparkle 3s ease-in-out infinite;
    }
    .sparkle:nth-child(2) { animation-delay: 1s; }
    .sparkle:nth-child(3) { animation-delay: 2s; }
    .sparkle:nth-child(4) { animation-delay: 0.5s; }
    .sparkle:nth-child(5) { animation-delay: 1.5s; }
  </style>

  <!-- Sky -->
  <rect class="sky" width="800" height="400"/>

  <!-- Sun -->
  <g>
    <circle class="sun-fill" cx="650" cy="80" r="28"/>
    <circle class="sun-circle" cx="650" cy="80" r="28"/>
    <g class="sun-rays">
      <line class="sun-ray" x1="650" y1="42" x2="650" y2="34"/>
      <line class="sun-ray" x1="677" y1="53" x2="683" y2="47"/>
      <line class="sun-ray" x1="688" y1="80" x2="696" y2="80"/>
      <line class="sun-ray" x1="677" y1="107" x2="683" y2="113"/>
      <line class="sun-ray" x1="650" y1="118" x2="650" y2="126"/>
      <line class="sun-ray" x1="623" y1="107" x2="617" y2="113"/>
      <line class="sun-ray" x1="612" y1="80" x2="604" y2="80"/>
      <line class="sun-ray" x1="623" y1="53" x2="617" y2="47"/>
    </g>
  </g>

  <!-- Clouds -->
  <g class="cloud cloud-1">
    <path class="line-thin" d="M120,70 Q130,55 145,60 Q155,48 170,58 Q182,50 192,60 Q200,55 205,65 Q195,72 180,70 Q165,75 150,70 Q135,74 120,70" stroke="#b8c6d4" stroke-width="1"/>
  </g>
  <g class="cloud cloud-2">
    <path class="line-thin" d="M450,50 Q458,38 470,43 Q478,33 490,42 Q498,36 505,45 Q498,50 488,48 Q478,52 468,48 Q458,51 450,50" stroke="#b8c6d4" stroke-width="1"/>
  </g>

  <!-- Neural Network Constellation -->
  <!-- Edges (connections) -->
  <g>
    <line class="neural-edge" x1="60" y1="45" x2="110" y2="80"/>
    <line class="neural-edge" x1="110" y1="80" x2="170" y2="105"/>
    <line class="neural-edge" x1="170" y1="105" x2="240" y2="140"/>
    <line class="neural-edge" x1="170" y1="105" x2="270" y2="85"/>
    <line class="neural-edge" x1="240" y1="140" x2="270" y2="85"/>
    <line class="neural-edge" x1="60" y1="45" x2="170" y2="105"/>
  </g>
  <!-- Nodes (birds) -->
  <g>
    <path class="neural-node-lg" d="M53,45 Q57,39 60,45 Q63,39 67,45" fill="none" stroke="#00ff41" stroke-width="0.7" stroke-linecap="round"/>
    <path class="neural-node" d="M104,80 Q107,74 110,80 Q113,74 116,80" fill="none" stroke="#00ff41" stroke-width="0.6" stroke-linecap="round"/>
    <path class="neural-node" d="M164,105 Q167,99 170,105 Q173,99 176,105" fill="none" stroke="#00ff41" stroke-width="0.7" stroke-linecap="round"/>
    <path class="neural-node-lg" d="M234,140 Q237,134 240,140 Q243,134 246,140" fill="none" stroke="#00ff41" stroke-width="0.7" stroke-linecap="round"/>
    <path class="neural-node" d="M264,85 Q267,79 270,85 Q273,79 276,85" fill="none" stroke="#00ff41" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- Horizon -->
  <line class="horizon" x1="0" y1="305" x2="800" y2="305"/>

  <!-- Water sparkles (sun reflection) -->
  <g>
    <circle class="sparkle" cx="600" cy="315" r="1.5"/>
    <circle class="sparkle" cx="630" cy="320" r="1"/>
    <circle class="sparkle" cx="660" cy="312" r="1.2"/>
    <circle class="sparkle" cx="620" cy="325" r="1"/>
    <circle class="sparkle" cx="650" cy="318" r="1.3"/>
  </g>

  <!-- Waves -->
  <path class="wave-line-1" d="M0,310 Q100,300 200,310 Q300,320 400,310 Q500,300 600,310 Q700,320 800,310 L800,400 L0,400 Z"/>
  <path class="wave-line-2" d="M0,320 Q100,312 200,320 Q300,328 400,320 Q500,312 600,320 Q700,328 800,320 L800,400 L0,400 Z"/>
  <path class="wave-line-3" d="M0,335 Q100,328 200,335 Q300,342 400,335 Q500,328 600,335 Q700,342 800,335 L800,400 L0,400 Z"/>

  <!-- Ship Group (bobbing) -->
  <g class="ship-group">

    <!-- Hull -->
    <path class="line-bold hull" d="M280,290 L300,305 L430,305 L445,290"/>
    <path class="line-thin hull-detail" d="M295,298 L435,298"/>
    <path class="line-thin hull-detail" d="M310,305 L310,298"/>
    <path class="line-thin hull-detail" d="M350,305 L350,298"/>
    <path class="line-thin hull-detail" d="M390,305 L390,298"/>
    <path class="line-thin hull-detail" d="M420,305 L420,298"/>

    <!-- Mast -->
    <line class="line-bold mast" x1="370" y1="145" x2="370" y2="290"/>
    <!-- Cross beam -->
    <line class="line mast" x1="355" y1="165" x2="395" y2="165"/>

    <!-- Main sail (filled shape behind line) -->
    <path class="sail-fill" d="M372,155 L372,270 L430,270 Z"/>
    <path class="line sail-main" d="M372,155 L372,270 L430,270 Z"/>
    <!-- Sail detail lines -->
    <path class="line-thin sail-main" d="M372,190 L415,260"/>
    <path class="line-thin sail-main" d="M372,220 L405,265"/>

    <!-- Front sail -->
    <path class="sail-fill" d="M368,160 L290,275 L368,275 Z"/>
    <path class="line sail-front" d="M368,160 L290,275 L368,275 Z"/>
    <path class="line-thin sail-front" d="M368,200 L310,270"/>



    <!-- Crew silhouettes -->
    <g>
      <!-- Person 1 - at helm -->
      <g class="crew-member">
        <circle class="line" cx="420" cy="272" r="5"/>
        <line class="line" x1="420" y1="277" x2="420" y2="290"/>
        <line class="line" x1="420" y1="280" x2="414" y2="286"/>
        <g class="wave-arm-1"><line class="line" x1="420" y1="280" x2="428" y2="275"/></g>
        <line class="line" x1="420" y1="290" x2="416" y2="298"/>
        <line class="line" x1="420" y1="290" x2="424" y2="298"/>
      </g>
      <!-- Person 2 - lookout -->
      <g class="crew-member">
        <circle class="line" cx="340" cy="272" r="5"/>
        <line class="line" x1="340" y1="277" x2="340" y2="290"/>
        <line class="line" x1="340" y1="282" x2="334" y2="278"/>
        <g class="wave-arm-2"><line class="line" x1="340" y1="282" x2="346" y2="278"/></g>
        <line class="line" x1="340" y1="290" x2="336" y2="298"/>
        <line class="line" x1="340" y1="290" x2="344" y2="298"/>
      </g>
      <!-- Person 3 - mid ship -->
      <g class="crew-member">
        <circle class="line" cx="380" cy="275" r="4.5"/>
        <line class="line" x1="380" y1="279" x2="380" y2="292"/>
        <line class="line" x1="380" y1="283" x2="374" y2="288"/>
        <g class="wave-arm-3"><line class="line" x1="380" y1="283" x2="386" y2="288"/></g>
        <line class="line" x1="380" y1="292" x2="377" y2="298"/>
        <line class="line" x1="380" y1="292" x2="383" y2="298"/>
      </g>
      <!-- Person 4 - front -->
      <g class="crew-member">
        <circle class="line" cx="310" cy="276" r="4.5"/>
        <line class="line" x1="310" y1="280" x2="310" y2="293"/>
        <g class="wave-arm-4"><line class="line" x1="310" y1="285" x2="304" y2="280"/></g>
        <line class="line" x1="310" y1="285" x2="316" y2="290"/>
        <line class="line" x1="310" y1="293" x2="307" y2="300"/>
        <line class="line" x1="310" y1="293" x2="313" y2="300"/>
      </g>
    </g>
  </g>



</svg>
